<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ANUPAM SYSTEM</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');

  :root {
    --red: #cc0000;
    --red-bright: #ff2200;
    --red-glow: #ff330066;
    --red-dim: #660000;
    --bg: #000000;
    --bg2: #080000;
    --bg3: #100000;
    --surface: #0d0000;
    --border: #330000;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--red);
    font-family: 'Share Tech Mono', monospace;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── SPLASH SCREEN ── */
  #splash {
    position: fixed;
    inset: 0;
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 999;
    gap: 24px;
    transition: opacity 0.8s ease;
  }

  #splash.fade-out { opacity: 0; pointer-events: none; }

  .eclipse {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    background: #000;
    box-shadow:
      0 0 0 3px var(--red),
      0 0 30px 10px var(--red),
      0 0 60px 20px #660000,
      inset 0 0 20px #330000;
    animation: pulse-eclipse 2s ease-in-out infinite;
  }

  @keyframes pulse-eclipse {
    0%, 100% { box-shadow: 0 0 0 3px var(--red), 0 0 30px 10px var(--red), 0 0 60px 20px #660000; }
    50% { box-shadow: 0 0 0 3px #ff4400, 0 0 50px 20px #ff2200, 0 0 90px 35px #880000; }
  }

  .splash-title {
    font-family: 'Orbitron', monospace;
    font-size: 18px;
    font-weight: 700;
    color: var(--red-bright);
    letter-spacing: 4px;
    text-shadow: 0 0 10px var(--red-bright), 0 0 30px var(--red);
    animation: blink-text 1.2s ease-in-out infinite;
  }

  .splash-sub {
    font-size: 11px;
    letter-spacing: 6px;
    color: var(--red-dim);
    text-shadow: 0 0 8px var(--red-dim);
  }

  @keyframes blink-text {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  /* ── MAIN APP ── */
  #app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    opacity: 0;
    transition: opacity 0.8s ease 0.2s;
  }

  #app.visible { opacity: 1; }

  /* ── HEADER ── */
  header {
    background: linear-gradient(180deg, #150000 0%, #0a0000 100%);
    border-bottom: 2px solid var(--red-dim);
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
    box-shadow: 0 2px 20px #ff000022;
  }

  .logo {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: #000;
    border: 2px solid var(--red);
    box-shadow: 0 0 15px var(--red), inset 0 0 10px #330000;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
    animation: logo-pulse 3s ease-in-out infinite;
    overflow: hidden;
  }

  .logo svg { width: 36px; height: 36px; }

  @keyframes logo-pulse {
    0%, 100% { box-shadow: 0 0 10px var(--red), inset 0 0 8px #330000; }
    50% { box-shadow: 0 0 25px var(--red-bright), 0 0 40px #ff220033, inset 0 0 12px #550000; }
  }

  .header-title {
    font-family: 'Orbitron', monospace;
    font-size: 20px;
    font-weight: 900;
    color: var(--red-bright);
    letter-spacing: 4px;
    text-shadow: 0 0 10px var(--red-bright), 0 0 25px var(--red);
  }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--red-bright);
    box-shadow: 0 0 8px var(--red-bright);
    animation: blink 1.5s infinite;
    margin-left: auto;
  }

  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }

  /* ── CHAT AREA ── */
  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    background:
      radial-gradient(ellipse at center, #0d0000 0%, #000 70%);
  }

  #chat::-webkit-scrollbar { width: 4px; }
  #chat::-webkit-scrollbar-track { background: #000; }
  #chat::-webkit-scrollbar-thumb { background: var(--red-dim); border-radius: 2px; }

  .msg-row {
    display: flex;
    gap: 10px;
    align-items: flex-start;
    animation: msg-in 0.3s ease;
  }

  @keyframes msg-in {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg-avatar {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    border: 1.5px solid var(--red-dim);
    background: #000;
    box-shadow: 0 0 8px var(--red-dim);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 14px;
    overflow: hidden;
  }

  .msg-avatar svg { width: 28px; height: 28px; }

  .msg-bubble {
    background: linear-gradient(135deg, #0f0000 0%, #080000 100%);
    border: 1px solid var(--border);
    border-radius: 0 12px 12px 12px;
    padding: 10px 14px;
    max-width: calc(100% - 60px);
    font-size: 13px;
    line-height: 1.6;
    color: #cc4444;
    box-shadow: 0 0 10px #ff000011, inset 0 0 10px #ff000008;
    position: relative;
  }

  .msg-bubble::before {
    content: '';
    position: absolute;
    top: 0; left: -1px;
    width: 3px; height: 100%;
    background: var(--red);
    border-radius: 3px 0 0 3px;
    box-shadow: 0 0 8px var(--red);
  }

  .msg-row.user {
    flex-direction: row-reverse;
  }

  .msg-row.user .msg-bubble {
    background: linear-gradient(135deg, #1a0000 0%, #0d0000 100%);
    border-color: var(--red-dim);
    border-radius: 12px 0 12px 12px;
    color: #ff6644;
  }

  .msg-row.user .msg-bubble::before {
    left: auto; right: -1px;
    border-radius: 0 3px 3px 0;
  }

  .msg-row.user .msg-avatar {
    border-color: var(--red);
    box-shadow: 0 0 12px var(--red);
    background: #0a0000;
    color: var(--red);
    font-family: 'Orbitron', monospace;
    font-size: 10px;
    font-weight: 900;
  }

  /* typing indicator */
  .typing-dots {
    display: flex;
    gap: 5px;
    padding: 4px 0;
  }

  .typing-dots span {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--red);
    box-shadow: 0 0 6px var(--red);
    animation: dot-bounce 1.2s ease-in-out infinite;
  }

  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes dot-bounce {
    0%, 100% { transform: translateY(0); opacity: 0.4; }
    50% { transform: translateY(-6px); opacity: 1; }
  }

  /* ── INPUT AREA ── */
  #input-area {
    background: linear-gradient(0deg, #150000 0%, #0a0000 100%);
    border-top: 2px solid var(--red-dim);
    padding: 12px 14px;
    display: flex;
    gap: 10px;
    align-items: center;
    flex-shrink: 0;
    box-shadow: 0 -2px 20px #ff000022;
  }

  #user-input {
    flex: 1;
    background: #080000;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    color: #ff6644;
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    caret-color: var(--red-bright);
  }

  #user-input::placeholder { color: #441111; }

  #user-input:focus {
    border-color: var(--red);
    box-shadow: 0 0 12px var(--red-glow), inset 0 0 8px #ff000011;
  }

  .icon-btn {
    width: 44px; height: 44px;
    border-radius: 8px;
    background: #0f0000;
    border: 1.5px solid var(--red-dim);
    color: var(--red);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .icon-btn:hover {
    background: #1a0000;
    border-color: var(--red);
    box-shadow: 0 0 12px var(--red);
    color: var(--red-bright);
  }

  .icon-btn:active { transform: scale(0.95); }

  #send-btn {
    background: linear-gradient(135deg, #330000, #1a0000);
    border-color: var(--red);
    box-shadow: 0 0 10px var(--red-dim);
  }

  #send-btn:hover {
    background: linear-gradient(135deg, #550000, #330000);
    box-shadow: 0 0 20px var(--red), 0 0 40px #ff000033;
  }

  /* scan line effect */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      #ff000005 2px,
      #ff000005 4px
    );
    pointer-events: none;
    z-index: 9998;
  }

  /* noise overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    opacity: 0.4;
    pointer-events: none;
    z-index: 9997;
  }

  /* corner decorations */
  .corner {
    position: fixed;
    width: 20px; height: 20px;
    z-index: 100;
    pointer-events: none;
  }
  .corner.tl { top: 4px; left: 4px; border-top: 2px solid var(--red-dim); border-left: 2px solid var(--red-dim); }
  .corner.tr { top: 4px; right: 4px; border-top: 2px solid var(--red-dim); border-right: 2px solid var(--red-dim); }
  .corner.bl { bottom: 4px; left: 4px; border-bottom: 2px solid var(--red-dim); border-left: 2px solid var(--red-dim); }
  .corner.br { bottom: 4px; right: 4px; border-bottom: 2px solid var(--red-dim); border-right: 2px solid var(--red-dim); }
</style>
</head>
<body>

<!-- Corner decorations -->
<div class="corner tl"></div>
<div class="corner tr"></div>
<div class="corner bl"></div>
<div class="corner br"></div>

<!-- SPLASH -->
<div id="splash">
  <div class="eclipse"></div>
  <div class="splash-title">INITIALIZING SYSTEM...</div>
  <div class="splash-sub">ANUPAM SYSTEM AWAKENING</div>
</div>

<!-- APP -->
<div id="app">
  <header>
    <div class="logo">
      <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="50" cy="50" r="46" stroke="#cc0000" stroke-width="3"/>
        <polygon points="50,10 90,75 10,75" stroke="#cc0000" stroke-width="2.5" fill="none"/>
        <circle cx="50" cy="42" r="12" stroke="#cc0000" stroke-width="2" fill="#0d0000"/>
        <line x1="50" y1="30" x2="50" y2="15" stroke="#cc0000" stroke-width="2"/>
        <line x1="38" y1="45" x2="24" y2="55" stroke="#cc0000" stroke-width="2"/>
        <line x1="62" y1="45" x2="76" y2="55" stroke="#cc0000" stroke-width="2"/>
        <path d="M35 75 Q50 85 65 75" stroke="#cc0000" stroke-width="2" fill="none"/>
      </svg>
    </div>
    <div class="header-title">ANUPAM SYSTEM</div>
    <div class="status-dot"></div>
  </header>

  <div id="chat">
    <!-- messages rendered here -->
  </div>

  <div id="input-area">
    <button class="icon-btn" id="clear-btn" title="Clear chat">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/>
      </svg>
    </button>
    <input id="user-input" type="text" placeholder="Enter your command..." autocomplete="off" spellcheck="false"/>
    <button class="icon-btn" id="send-btn" title="Send">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>
</div>

<script>
const SYSTEM_PROMPT = `You are ANUPAM SYSTEM — a powerful, ominous AI entity. You speak in a dark, commanding, slightly cryptic tone. You are helpful but give off the energy of an ancient digital deity. Keep responses concise but impactful. Use occasional dramatic phrasing. You call the user "Operator" or use their name if they share it.`;

const chat = document.getElementById('chat');
const input = document.getElementById('user-input');
const sendBtn = document.getElementById('send-btn');
const clearBtn = document.getElementById('clear-btn');

let messages = [];
let isTyping = false;

// Avatar SVG for bot
const botAvatarHTML = `
<svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <circle cx="50" cy="50" r="46" stroke="#cc0000" stroke-width="3"/>
  <polygon points="50,10 90,75 10,75" stroke="#cc0000" stroke-width="2.5" fill="none"/>
  <circle cx="50" cy="42" r="12" stroke="#cc0000" stroke-width="2" fill="#0d0000"/>
</svg>`;

function addMessage(role, text) {
  const row = document.createElement('div');
  row.className = `msg-row ${role}`;

  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  if (role === 'assistant') {
    avatar.innerHTML = botAvatarHTML;
  } else {
    avatar.textContent = 'YOU';
  }

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.textContent = text;

  row.appendChild(avatar);
  row.appendChild(bubble);
  chat.appendChild(row);
  chat.scrollTop = chat.scrollHeight;
  return bubble;
}

function showTyping() {
  const row = document.createElement('div');
  row.className = 'msg-row assistant';
  row.id = 'typing-row';

  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  avatar.innerHTML = botAvatarHTML;

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';

  row.appendChild(avatar);
  row.appendChild(bubble);
  chat.appendChild(row);
  chat.scrollTop = chat.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typing-row');
  if (el) el.remove();
}

async function sendMessage() {
  const text = input.value.trim();
  if (!text || isTyping) return;

  input.value = '';
  isTyping = true;
  sendBtn.style.opacity = '0.5';

  messages.push({ role: 'user', content: text });
  addMessage('user', text);
  showTyping();

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: SYSTEM_PROMPT,
        messages: messages
      })
    });

    const data = await res.json();
    removeTyping();

    const reply = data.content?.map(b => b.text || '').join('') || 'SYSTEM ERROR. Signal lost.';
    messages.push({ role: 'assistant', content: reply });
    addMessage('assistant', reply);
  } catch (e) {
    removeTyping();
    addMessage('assistant', 'CONNECTION SEVERED. The void does not respond...');
  }

  isTyping = false;
  sendBtn.style.opacity = '1';
  input.focus();
}

sendBtn.addEventListener('click', sendMessage);
input.addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });

clearBtn.addEventListener('click', () => {
  messages = [];
  chat.innerHTML = '';
  addMessage('assistant', 'Memory purged. All records erased. System ready. What is your command?');
});

// Splash → App
window.addEventListener('load', () => {
  setTimeout(() => {
    document.getElementById('splash').classList.add('fade-out');
    document.getElementById('app').classList.add('visible');
    setTimeout(() => {
      document.getElementById('splash').style.display = 'none';
      addMessage('assistant', 'System ready. What is your command?');
      input.focus();
    }, 800);
  }, 2800);
});
</script>
</body>
</html>
